<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/solutions.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <div class="header-item"><i class="bi bi-play-btn"></i></div>
      <div class="header-item">
        <h3 class="profile-link">Esplora</h3>
        <h3 class="profile-link">Seguiti</h3>
        <h3 class="profile-link">Per te</h3>
      </div>
      <div class="header-item"><i class="bi bi-search"></i></div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-items">
        <div class="sidebar-icons">
          <img class="logo" src="./assets/img/boolean_logo.png" alt="logo boolean">
        </div>
        <div class="sidebar-icons">
          <i class="bi bi-heart-fill"></i>
          <p class="icon-txt">588</p>
        </div>
        <div class="sidebar-icons">
          <i class="bi bi-chat-dots-fill"></i>
          <p class="icon-txt">13</p>
        </div>
        <div class="sidebar-icons">
          <i class="bi bi-bookmark-fill"></i>
          <p class="icon-txt">638</p>
        </div>
        <div class="sidebar-icons">
          <i class="bi bi-sign-turn-slight-right-fill"></i>
          <p class="icon-txt">491</p>
        </div>
      </div>
      <div class="sidebar-items">
        <h4 class="video-title">boolean.careers</h4>
        <p class="video-txt">Prova il Fundamentals Camp, 20 ore di corso gratuito per... <strong>Vedi altro</strong></p>
      </div>

    </div>

    <!-- Footer -->
    <footer>
      <div class="navbar">
        <div class="navbar-items">
          <i class="bi bi-house-fill"></i>
          <p class="nav-txt">Home</p>
        </div>
        <div class="navbar-items">
          <i class="bi bi-people"></i>
          <p class="nav-txt">Amici</p>
        </div>
        <div class="navbar-items">
          <i class="bi bi-file-plus-fill"></i>
        </div>
        <div class="navbar-items">
          <i class="bi bi-chat-square"></i>
          <p class="nav-txt">Posta in arrivo</p>
        </div>
        <div class="navbar-items">
          <i class="bi bi-person"></i>
          <p class="nav-txt">Profilo</p>
        </div>
      </div>
    </footer>
  </div>

</body>

</html>
